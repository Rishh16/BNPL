<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BNPL Signup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="center">
  <div class="card sm">
    <h2 class="heroTitle">Create Account</h2>
    <p class="heroSub">Start buying now, pay later</p>

    <form id="signupForm">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name" required />
      </div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label>Phone Number</label>
        <input type="number" id="phone" placeholder="10-digit mobile" required />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create password" required />
        <span class="hint">Minimum 6 characters</span>
      </div>

      <button class="btn btn-primary" type="submit">
        Create Account
      </button>
    </form>

    <div class="footer">
      Already have an account?
      <a href="login.html">Login</a>
    </div>
  </div>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    password: document.getElementById("password").value
  };

  const res = await fetch("/auth/signup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await res.json();

  if (result.error) {
    alert(result.error);
  } else {
    alert("Signup successful");
    window.location.href = "login.html"; // ✅ redirect
  }
});
</script>

</body>
</html>
